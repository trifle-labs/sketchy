<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>babynames.market — name card generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f0f4f8; color: #1a1a1a;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 40px 16px;
  }
  .app { max-width: 520px; width: 100%; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 {
    font-size: 14px; font-weight: 400; color: #6b8db5;
    letter-spacing: 1.5px; text-transform: uppercase;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .search-bar { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; }
  .search-bar input[type="text"] {
    flex: 1; font-size: 16px; padding: 10px 14px;
    border: 1px solid #c8d8e8; border-radius: 12px;
    background: #fff; outline: none; color: #1a1a1a;
  }
  .search-bar input:focus { border-color: #b49ce8; }
  .search-bar input::placeholder { color: #99aabb; }
  .sex-toggle { display: flex; gap: 2px; }
  .sex-btn {
    padding: 10px 14px; font-size: 13px; font-weight: 600;
    border-radius: 12px; cursor: pointer;
    border: 1px solid #c8d8e8; background: #fff; color: #6b8db5;
  }
  .sex-btn.active { border-color: #b49ce8; background: rgba(180,156,232,0.1); color: #8b6cc8; }
  .lookup-btn {
    padding: 10px 20px; font-size: 13px; font-weight: 600;
    border-radius: 12px; cursor: pointer;
    background: #d1e5f7; border: none; color: #1a3a5c;
  }
  .lookup-btn:hover { background: #bdd6f0; }
  .btn-row { display: flex; gap: 6px; margin-bottom: 20px; }
  .random-btn, .export-btn {
    padding: 8px 14px; font-size: 11px; font-weight: 500;
    border-radius: 10px; cursor: pointer;
    background: #fff; border: 1px solid #d0dae4; color: #6b8db5;
  }
  .random-btn:hover, .export-btn:hover { background: #e8f0f8; border-color: #b49ce8; }
  .export-btn { background: #d1e5f7; border-color: #b4cde8; color: #1a3a5c; }
  .export-btn:hover { background: #bdd6f0; }
  .export-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { text-align: center; padding: 40px 20px; color: #6b8db5; font-size: 13px; }
  .status .sub { font-size: 11px; color: #99aabb; margin-top: 6px; }
  .error { font-size: 12px; color: #d85a30; padding: 0 4px; margin-bottom: 12px; }

  /* CARD — square aspect ratio */
  .card-outer {
    border-radius: 24px; padding: 20px;
    width: 480px; height: 480px;
    display: flex; flex-direction: column;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 4px 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    flex-shrink: 0;
  }
  .card-inner {
    background: #0c1425; border-radius: 18px; overflow: hidden;
    flex: 1; display: flex; flex-direction: column;
  }
  .card-name-area { padding: 18px 20px 4px; display: flex; justify-content: space-between; align-items: flex-start; }
  .card-name-left { flex: 1; }
  .card-name-row { display: flex; align-items: baseline; gap: 8px; }
  .card-name { font-size: 40px; font-weight: 600; color: #f0f4f8; letter-spacing: -1px; }
  .card-sex { font-size: 13px; font-weight: 500; }
  .card-subtitle { font-size: 11px; color: #6b7d99; margin-top: 2px; }
  .card-rattle { flex-shrink: 0; margin-top: 2px; }
  .card-sparkline { padding: 10px 20px 6px; flex-shrink: 0; }
  .card-stats { padding: 4px 20px 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; flex-shrink: 0; }
  .stat-box { background: #111d33; border-radius: 10px; padding: 8px 6px; text-align: center; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .stat-label { font-size: 8px; color: #4a6a8a; margin-top: 1px; letter-spacing: 0.3px; }
  .card-narrative { padding: 0 20px 16px; flex: 1; min-height: 0; }
  .narrative-box { background: #111d33; border-radius: 12px; padding: 12px 14px; height: 100%; }
  .narrative-summary { font-size: 11px; color: #8fa4be; line-height: 1.6; }

  .edit-area { margin-top: 16px; background: #fff; border-radius: 14px; padding: 16px; border: 1px solid #e0e8f0; }
  .edit-label { font-size: 10px; color: #99aabb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .edit-area textarea {
    width: 100%; border: 1px solid #d0dae4; border-radius: 8px;
    padding: 10px; font-size: 12px; font-family: inherit;
    resize: vertical; outline: none; color: #1a1a1a; line-height: 1.5;
  }
  .edit-area textarea:focus { border-color: #b49ce8; }
  .edit-area .apply-btn {
    margin-top: 8px; padding: 6px 14px; font-size: 11px;
    border-radius: 8px; cursor: pointer;
    background: #d1e5f7; border: none; color: #1a3a5c;
  }
  .edit-area .apply-btn:hover { background: #bdd6f0; }

  .tweet-area-wrapper { margin-top: 16px; background: #fff; border-radius: 14px; padding: 16px; border: 1px solid #e0e8f0; }
  .tweet-label { font-size: 10px; color: #99aabb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .tweet-text {
    font-size: 13px; color: #1a1a1a; line-height: 1.6;
    font-family: 'SF Mono', 'Fira Code', monospace;
    white-space: pre-wrap; word-break: break-word;
  }
  .copy-btn {
    margin-top: 10px; padding: 6px 14px; font-size: 11px;
    border-radius: 8px; cursor: pointer;
    background: #f0f4f8; border: 1px solid #d0dae4; color: #4a6a8a;
  }
  .copy-btn:hover { background: #e4ecf4; }

  .history { margin-top: 24px; border-top: 1px solid #d8e4ef; padding-top: 16px; }
  .history-label { font-size: 10px; color: #99aabb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .history-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-chip {
    padding: 5px 12px; font-size: 12px; border-radius: 20px; cursor: pointer;
    background: #fff; border: 1px solid #d0dae4; color: #4a6a8a;
  }
  .history-chip:hover { background: #e8f0f8; border-color: #b49ce8; }
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>babynames.market — name card generator</h1></div>
  <div id="loading-area" class="status">
    <div id="loading-text">loading name data...</div>
    <div class="sub">2.1 million records across 145 years (~17MB)</div>
  </div>
  <div id="search-area" style="display:none;">
    <div class="search-bar">
      <input type="text" id="name-input" placeholder="enter a name..." autocomplete="off" />
      <div class="sex-toggle">
        <button class="sex-btn active" id="btn-f" onclick="setSex('F')">girl</button>
        <button class="sex-btn" id="btn-m" onclick="setSex('M')">boy</button>
      </div>
      <button class="lookup-btn" onclick="doSearch()">look up</button>
    </div>
    <div class="btn-row">
      <button class="random-btn" onclick="randomName()">random obscure name</button>
      <button class="export-btn" id="export-btn" onclick="exportCard()" disabled>export card as PNG</button>
    </div>
    <div id="error-msg" class="error" style="display:none;"></div>
  </div>
  <div id="card-area" style="display:none;"></div>
  <div id="edit-area" style="display:none;"></div>
  <div id="tweet-area" style="display:none;"></div>
  <div id="history-area" style="display:none;">
    <div class="history">
      <div class="history-label">recent lookups</div>
      <div class="history-chips" id="history-chips"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const YEAR_MIN = 1880, YEAR_MAX = 2024;
let nameData = {}, nameKeys = [], nameIndex = {}, yearTotals = {};
let currentSex = 'F', searchHistory = [], currentProfile = null;

function rattleSVG(stripeColor) {
  return '<svg viewBox="0 0 40 82" xmlns="http://www.w3.org/2000/svg" width="40" height="82">' +
    '<defs><clipPath id="rc"><circle cx="20" cy="19" r="15"/></clipPath></defs>' +
    '<circle cx="20" cy="19" r="15" fill="#6b7d99" opacity="0.3"/>' +
    '<g clip-path="url(#rc)">' +
      '<path d="M5,12 Q20,17 35,12" fill="none" stroke="' + stripeColor + '" stroke-width="3" stroke-linecap="round"/>' +
      '<path d="M5,20 Q20,25 35,20" fill="none" stroke="' + stripeColor + '" stroke-width="4" stroke-linecap="round"/>' +
      '<path d="M5,28 Q20,33 35,28" fill="none" stroke="' + stripeColor + '" stroke-width="2.5" stroke-linecap="round"/>' +
    '</g>' +
    '<ellipse cx="20" cy="34" rx="7.5" ry="2.8" fill="#6b7d99" opacity="0.3"/>' +
    '<path d="M15.5,34 Q15.5,40 14.5,47 Q13.5,53 14.5,58 Q15.5,62 17.5,65 Q19,67 20,69 Q21,67 22.5,65 Q24.5,62 25.5,58 Q26.5,53 25.5,47 Q24.5,40 24.5,34 Z" fill="#6b7d99" opacity="0.3"/>' +
    '<ellipse cx="20" cy="66" rx="5.5" ry="6" fill="#6b7d99" opacity="0.3"/>' +
    '<ellipse cx="20" cy="66" rx="3" ry="3.5" fill="#0c1425"/>' +
  '</svg>';
}

async function loadData() {
  const lt = document.getElementById('loading-text');
  try {
    lt.textContent = 'fetching data...';
    const r = await fetch('ssa-names.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    lt.textContent = 'parsing...';
    nameData = await r.json();
    nameKeys = Object.keys(nameData);
    for (const key of nameKeys) nameIndex[key.toLowerCase()] = key;
    lt.textContent = 'building rank index...';
    for (const [key, arr] of Object.entries(nameData)) {
      const sex = key.split('/')[1];
      for (let i = 0; i < arr.length; i += 2) {
        const year = arr[i], count = arr[i + 1];
        if (!yearTotals[year]) yearTotals[year] = {};
        if (!yearTotals[year][sex]) yearTotals[year][sex] = [];
        yearTotals[year][sex].push({ key, count });
      }
    }
    for (const year of Object.keys(yearTotals))
      for (const sex of Object.keys(yearTotals[year]))
        yearTotals[year][sex].sort((a, b) => b.count - a.count);
    document.getElementById('loading-area').style.display = 'none';
    document.getElementById('search-area').style.display = 'block';
    document.getElementById('name-input').focus();
  } catch (e) {
    lt.textContent = 'failed: ' + e.message;
    document.querySelector('.sub').textContent = 'make sure ssa-names.json is in the same folder. serve via http, not file://.';
  }
}

function buildProfile(name, sex) {
  const lookupKey = (name + '/' + sex).toLowerCase();
  const realKey = nameIndex[lookupKey];
  if (!realKey) return null;
  const arr = nameData[realKey];
  const realName = realKey.split('/')[0];
  const entries = [];
  for (let i = 0; i < arr.length; i += 2) {
    const year = arr[i], count = arr[i + 1];
    const yearList = yearTotals[year] && yearTotals[year][sex];
    let rank = 0;
    if (yearList) rank = yearList.findIndex(e => e.key === realKey) + 1;
    entries.push({ year, count, rank });
  }
  entries.sort((a, b) => a.year - b.year);
  if (!entries.length) return null;
  const pk = entries.reduce((b, e) => e.count > b.count ? e : b, entries[0]);
  return {
    name: realName, sex, entries,
    peakYear: pk.year, peakRank: pk.rank, peakCount: pk.count,
    firstYear: entries[0].year, lastYear: entries[entries.length - 1].year,
    totalBabies: entries.reduce((s, e) => s + e.count, 0), yearsOnList: entries.length,
    yearsSinceLastSeen: YEAR_MAX - entries[entries.length - 1].year,
    isActive: entries[entries.length - 1].year >= YEAR_MAX - 2
  };
}

function setSex(s) {
  currentSex = s;
  document.getElementById('btn-f').classList.toggle('active', s === 'F');
  document.getElementById('btn-m').classList.toggle('active', s === 'M');
}

function randomName() {
  const obscure = nameKeys.filter(k => nameData[k].length <= 10);
  if (!obscure.length) return;
  const pick = obscure[Math.floor(Math.random() * obscure.length)];
  const [name, sex] = pick.split('/');
  document.getElementById('name-input').value = name;
  setSex(sex);
  doSearch();
}

function doSearch() {
  const input = document.getElementById('name-input').value.trim();
  const err = document.getElementById('error-msg');
  err.style.display = 'none';
  if (!input) return;
  let p = buildProfile(input, currentSex);
  if (!p) {
    const otherSex = currentSex === 'F' ? 'M' : 'F';
    p = buildProfile(input, otherSex);
    if (p) setSex(otherSex);
  }
  if (!p) {
    err.textContent = '\u201c' + input + '\u201d not found (either sex). ssa only lists names with 5+ births/year.';
    err.style.display = 'block';
    document.getElementById('card-area').style.display = 'none';
    document.getElementById('edit-area').style.display = 'none';
    document.getElementById('tweet-area').style.display = 'none';
    document.getElementById('export-btn').disabled = true;
    return;
  }
  currentProfile = p;
  searchHistory = searchHistory.filter(h => h.key !== p.name + '/' + p.sex);
  searchHistory.unshift({ key: p.name + '/' + p.sex, name: p.name, sex: p.sex });
  if (searchHistory.length > 15) searchHistory.pop();
  renderHistory();
  renderCard(p, '', '');
  renderEditArea(p);
  renderTweet(p);
  document.getElementById('export-btn').disabled = false;
}

function renderHistory() {
  const a = document.getElementById('history-area'), c = document.getElementById('history-chips');
  if (!searchHistory.length) { a.style.display = 'none'; return; }
  a.style.display = 'block';
  c.innerHTML = searchHistory.map(h =>
    '<button class="history-chip" onclick="qSearch(\'' + h.name.replace(/'/g, "\\'") + '\',\'' + h.sex + '\')">' +
    h.name + ' <span style="color:#b49ce8;font-size:10px">' + h.sex + '</span></button>'
  ).join('');
}

function qSearch(n, s) { document.getElementById('name-input').value = n; setSex(s); doSearch(); }

function sparkSVG(entries, peakYear, accent) {
  accent = accent || '#9cb4e8';
  const w = 436, h = 60, pad = 4, ys = YEAR_MAX - YEAR_MIN || 1, mc = Math.max(...entries.map(e => e.count));
  const xY = y => pad + ((y - YEAR_MIN) / ys) * (w - pad * 2);
  const yC = c => h - 14 - (c / mc) * (h - 24);
  let s = '<svg width="100%" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">';
  s += '<line x1="0" y1="' + (h - 12) + '" x2="' + w + '" y2="' + (h - 12) + '" stroke="#1a2744" stroke-width="0.5"/>';
  if (entries.length === 1) {
    const cx = xY(entries[0].year), cy = h / 2 - 6;
    s += '<line x1="' + cx + '" y1="0" x2="' + cx + '" y2="' + (h - 14) + '" stroke="#1a2744" stroke-width="0.5" stroke-dasharray="2,3"/>';
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="10" fill="' + accent + '" opacity="0.08"/>';
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="6" fill="' + accent + '" opacity="0.15"/>';
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="3" fill="' + accent + '" opacity="0.9"/>';
    s += '<line x1="' + (cx + 6) + '" y1="' + cy + '" x2="' + (w - pad) + '" y2="' + (h - 18) + '" stroke="#253552" stroke-width="0.5" stroke-dasharray="2,4"/>';
    s += '<text x="' + (w / 2) + '" y="' + (cy + 2) + '" fill="#3d5170" font-size="8" font-style="italic" text-anchor="middle" font-family="sans-serif">silence</text>';
    s += '<text x="' + cx + '" y="' + (h - 2) + '" fill="#3d5170" font-size="8" text-anchor="middle" font-family="monospace">' + entries[0].year + '</text>';
    s += '<text x="' + (w - pad) + '" y="' + (h - 2) + '" fill="#3d5170" font-size="8" text-anchor="end" font-family="monospace">' + YEAR_MAX + '</text>';
  } else {
    s += '<polyline points="' + entries.map(e => xY(e.year) + ',' + yC(e.count)).join(' ') + '" fill="none" stroke="' + accent + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>';
    const pe = entries.find(e => e.year === peakYear);
    if (pe) { const cx = xY(pe.year), cy = yC(pe.count); s += '<circle cx="' + cx + '" cy="' + cy + '" r="6" fill="' + accent + '" opacity="0.15"/><circle cx="' + cx + '" cy="' + cy + '" r="2.5" fill="' + accent + '"/>'; }
    // dot on last entry
    const last = entries[entries.length - 1];
    const lcx = xY(last.year), lcy = yC(last.count);
    s += '<circle cx="' + lcx + '" cy="' + lcy + '" r="3" fill="' + accent + '"/>';
    s += '<text x="' + xY(entries[0].year) + '" y="' + (h - 2) + '" fill="#3d5170" font-size="8" text-anchor="middle" font-family="monospace">' + entries[0].year + '</text>';
    s += '<text x="' + (w - pad) + '" y="' + (h - 2) + '" fill="#3d5170" font-size="8" text-anchor="end" font-family="monospace">' + YEAR_MAX + '</text>';
  }
  return s + '</svg>';
}

function renderCard(p, summaryText, contextText) {
  const a = document.getElementById('card-area'); a.style.display = 'block';
  const isGirl = p.sex === 'F';
  const outerBg = isGirl ? '#f7d1e5' : '#d1e5f7';
  const accentColor = isGirl ? '#e89cb4' : '#9cb4e8';
  const headerColor = isGirl ? '#b56b8d' : '#6b8db5';
  const sexColor = isGirl ? '#c47a95' : '#7a95c4';
  const stripeColor = isGirl ? '#f7d1e5' : '#d1e5f7';

  const sub = p.isActive ? 'appeared ' + p.firstYear + ' \u00b7 rank #' + p.peakRank + ' \u00b7 continuing'
    : p.yearsOnList === 1 ? 'appeared ' + p.firstYear + ' \u00b7 rank #' + p.peakRank + ' \u00b7 then nothing'
    : p.firstYear + '\u2013' + p.lastYear + ' \u00b7 peak rank #' + p.peakRank + ' in ' + p.peakYear;
  let s3v, s3l, s3c;
  if (p.isActive) { s3v = '0'; s3l = 'years gone'; s3c = '#4ade80'; }
  else if (p.yearsSinceLastSeen > 0) { s3v = p.yearsSinceLastSeen; s3l = 'years gone'; s3c = '#f87171'; }
  else { s3v = '#' + p.peakRank; s3l = 'peak rank'; s3c = '#4ade80'; }

  let narrativeHTML = '';
  if (summaryText) {
    narrativeHTML = '<div class="card-narrative"><div class="narrative-box">' +
      '<div class="narrative-summary">' + summaryText + '</div>' +
      '</div></div>';
  }

  a.innerHTML = '<div class="card-outer" id="screenshot-target" style="background:' + outerBg + '">' +
    '<div class="card-header" style="color:' + headerColor + '"><span>ssa file #' + String(p.peakRank).padStart(4, '0') + '</span><span>babynames.market</span></div>' +
    '<div class="card-inner">' +
      '<div class="card-name-area">' +
        '<div class="card-name-left"><div class="card-name-row"><span class="card-name">' + p.name + '</span><span class="card-sex" style="color:' + sexColor + '">' + (isGirl ? 'girl' : 'boy') + '</span></div><div class="card-subtitle">' + sub + '</div></div>' +
        '<div class="card-rattle">' + rattleSVG(stripeColor) + '</div>' +
      '</div>' +
      '<div class="card-sparkline">' + sparkSVG(p.entries, p.peakYear, accentColor) + '</div>' +
      '<div class="card-stats">' +
        '<div class="stat-box"><div class="stat-value" style="color:#4ade80">' + p.yearsOnList + '</div><div class="stat-label">' + (p.yearsOnList === 1 ? 'year on list' : 'years on list') + '</div></div>' +
        '<div class="stat-box"><div class="stat-value" style="color:#f0f4f8">' + p.totalBabies.toLocaleString() + '</div><div class="stat-label">total babies</div></div>' +
        '<div class="stat-box"><div class="stat-value" style="color:' + s3c + '">' + s3v + '</div><div class="stat-label">' + s3l + '</div></div>' +
      '</div>' +
      narrativeHTML +
    '</div>' +
  '</div>';
}

function renderEditArea(p) {
  const a = document.getElementById('edit-area'); a.style.display = 'block';
  let defaultSummary = '';
  if (p.yearsOnList === 1) {
    defaultSummary = p.totalBabies + ' babies were given this name in ' + p.firstYear + '. then it vanished from the record entirely. the ssa requires 5 births to list a name \u2014 ' + p.name.toLowerCase() + ' appeared just enough to exist, and never again.';
  } else if (p.isActive) {
    defaultSummary = p.name + ' has consistently risen in popularity since ' + p.firstYear + ', becoming a top ' + Math.ceil(p.peakRank / 10) * 10 + ' name in ' + YEAR_MAX + '.';
  } else if (p.yearsOnList <= 5) {
    defaultSummary = p.name.toLowerCase() + ' appeared on the list ' + p.yearsOnList + ' times between ' + p.firstYear + ' and ' + p.lastYear + '. ' + p.totalBabies.toLocaleString() + ' babies total. barely a name. more of a rumor.';
  } else {
    defaultSummary = p.name.toLowerCase() + ' peaked at #' + p.peakRank + ' in ' + p.peakYear + ' with ' + p.peakCount.toLocaleString() + ' babies. held on for ' + p.yearsOnList + ' years before disappearing in ' + p.lastYear + '.';
  }
  a.innerHTML = '<div class="edit-area">' +
    '<div class="edit-label">card text (edit and apply)</div>' +
    '<textarea id="summary-input" rows="3">' + defaultSummary + '</textarea>' +
    '<button class="apply-btn" onclick="applyNarrative()">apply to card</button>' +
  '</div>';
  renderCard(currentProfile, defaultSummary, '');
}

function applyNarrative() {
  if (!currentProfile) return;
  renderCard(currentProfile, document.getElementById('summary-input').value.trim(), '');
}

function renderTweet(p) {
  const a = document.getElementById('tweet-area'); a.style.display = 'block';
  let t;
  if (p.yearsOnList === 1)
    t = p.name.toLowerCase() + '. ' + p.totalBabies + ' ' + (p.totalBabies === 1 ? 'baby' : 'babies') + '. ' + p.firstYear + '. never again.\n\nthe minimum viable name.';
  else if (p.isActive)
    t = p.name.toLowerCase() + '. on the list since ' + p.firstYear + '. peaked at #' + p.peakRank + ' in ' + p.peakYear + '. ' + p.totalBabies.toLocaleString() + ' babies and counting.';
  else if (p.yearsOnList <= 5)
    t = p.name.toLowerCase() + '. ' + p.yearsOnList + ' years on the list. ' + p.totalBabies.toLocaleString() + ' babies total. appeared in ' + p.firstYear + ', gone by ' + (p.lastYear + 1) + '.\n\nbarely a name. more of a rumor.';
  else
    t = p.name.toLowerCase() + '. ' + p.firstYear + '\u2013' + p.lastYear + '. peaked at #' + p.peakRank + '. then ' + p.yearsSinceLastSeen + ' years of silence.\n\nnames don\'t die. they just stop being chosen.';
  a.innerHTML = '<div class="tweet-area-wrapper"><div class="tweet-label">suggested tweet</div><div class="tweet-text" id="tweet-text">' + t + '</div><button class="copy-btn" onclick="copyTweet()">copy tweet</button></div>';
}

function copyTweet() {
  navigator.clipboard.writeText(document.getElementById('tweet-text').textContent).then(() => {
    const b = document.querySelector('.copy-btn'); b.textContent = 'copied'; setTimeout(() => b.textContent = 'copy tweet', 1500);
  });
}

function exportCard() {
  const target = document.getElementById('screenshot-target');
  if (!target) return;
  const btn = document.getElementById('export-btn');
  btn.textContent = 'exporting...'; btn.disabled = true;

  // force exact square dimensions for export
  const size = 480;
  target.style.width = size + 'px';
  target.style.height = size + 'px';

  html2canvas(target, {
    backgroundColor: null,
    scale: 2,
    width: size,
    height: size,
    useCORS: true,
    logging: false
  }).then(function(canvas) {
    // ensure output is exactly square
    const sq = document.createElement('canvas');
    const side = Math.max(canvas.width, canvas.height);
    sq.width = side; sq.height = side;
    const ctx = sq.getContext('2d');
    // fill with the card's outer bg color
    const isGirl = currentProfile && currentProfile.sex === 'F';
    ctx.fillStyle = isGirl ? '#f7d1e5' : '#d1e5f7';
    ctx.fillRect(0, 0, side, side);
    // center the card
    const ox = Math.round((side - canvas.width) / 2);
    const oy = Math.round((side - canvas.height) / 2);
    ctx.drawImage(canvas, ox, oy);

    const link = document.createElement('a');
    link.download = (currentProfile ? currentProfile.name.toLowerCase() : 'namecard') + '-babynames-market.png';
    link.href = sq.toDataURL('image/png');
    link.click();
    btn.textContent = 'export card as PNG'; btn.disabled = false;
  }).catch(function(err) {
    console.error('export failed:', err);
    btn.textContent = 'export failed'; btn.disabled = false;
    setTimeout(() => { btn.textContent = 'export card as PNG'; }, 2000);
  });
}

document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
loadData();
</script>
