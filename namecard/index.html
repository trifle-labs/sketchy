<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>babynames.market — name card generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f0f4f8; color: #1a1a1a;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 40px 16px;
  }
  .app { max-width: 540px; width: 100%; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 14px; font-weight: 400; color: #6b8db5; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'SF Mono', 'Fira Code', monospace; }
  .search-bar { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; }
  .search-bar input[type="text"] { flex: 1; font-size: 16px; padding: 10px 14px; border: 1px solid #c8d8e8; border-radius: 12px; background: #fff; outline: none; color: #1a1a1a; }
  .search-bar input:focus { border-color: #b49ce8; }
  .search-bar input::placeholder { color: #99aabb; }
  .sex-toggle { display: flex; gap: 2px; }
  .sex-btn { padding: 10px 14px; font-size: 13px; font-weight: 600; border-radius: 12px; cursor: pointer; border: 1px solid #c8d8e8; background: #fff; color: #6b8db5; }
  .sex-btn.active { border-color: #b49ce8; background: rgba(180,156,232,0.1); color: #8b6cc8; }
  .lookup-btn { padding: 10px 20px; font-size: 13px; font-weight: 600; border-radius: 12px; cursor: pointer; background: #d1e5f7; border: none; color: #1a3a5c; }
  .lookup-btn:hover { background: #bdd6f0; }
  .btn-row { display: flex; gap: 6px; margin-bottom: 20px; }
  .random-btn, .export-btn { padding: 8px 14px; font-size: 11px; font-weight: 500; border-radius: 10px; cursor: pointer; background: #fff; border: 1px solid #d0dae4; color: #6b8db5; }
  .random-btn:hover, .export-btn:hover { background: #e8f0f8; border-color: #b49ce8; }
  .export-btn { background: #d1e5f7; border-color: #b4cde8; color: #1a3a5c; }
  .export-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { text-align: center; padding: 40px 20px; color: #6b8db5; font-size: 13px; }
  .status .sub { font-size: 11px; color: #99aabb; margin-top: 6px; }
  .error { font-size: 12px; color: #d85a30; padding: 0 4px; margin-bottom: 12px; }

  /* CARD */
  .card-outer { border-radius: 20px; padding: 16px 16px 14px; width: 500px; height: 500px; display: flex; flex-direction: column; }
  .card-header { display: flex; justify-content: space-between; align-items: center; padding: 0 2px 10px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; flex-shrink: 0; }
  .card-inner { background: #0c1425; border-radius: 16px; overflow: hidden; flex: 1; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.06); }
  .card-top { padding: 20px 22px 0; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
  .card-name-left {}
  .card-name-row { display: flex; align-items: baseline; gap: 8px; }
  .card-name { font-size: 48px; font-weight: 700; color: #f0f4f8; letter-spacing: -1.5px; line-height: 1; }
  .card-sex { font-size: 16px; font-weight: 500; }
  .card-subtitle { font-size: 11px; color: #6b7d99; margin-top: 6px; }
  .card-rattle { flex-shrink: 0; margin-top: 4px; }
  .card-chart { padding: 12px 22px 0; flex: 1; min-height: 0; }
  .card-chart svg { display: block; }
  .card-stats { padding: 12px 22px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; flex-shrink: 0; }
  .stat-box { background: #111d33; border-radius: 10px; padding: 10px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.04); }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 8px; color: #4a6a8a; margin-top: 2px; letter-spacing: 0.3px; text-transform: lowercase; }
  .card-narrative { padding: 0 22px 18px; flex-shrink: 0; }
  .narrative-box { background: #111d33; border-radius: 10px; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.04); }
  .narrative-summary { font-size: 12px; color: #8fa4be; line-height: 1.55; }

  .edit-area { margin-top: 16px; background: #fff; border-radius: 14px; padding: 16px; border: 1px solid #e0e8f0; }
  .edit-label { font-size: 10px; color: #99aabb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .edit-area textarea { width: 100%; border: 1px solid #d0dae4; border-radius: 8px; padding: 10px; font-size: 12px; font-family: inherit; resize: vertical; outline: none; color: #1a1a1a; line-height: 1.5; }
  .edit-area textarea:focus { border-color: #b49ce8; }
  .edit-area .apply-btn { margin-top: 8px; padding: 6px 14px; font-size: 11px; border-radius: 8px; cursor: pointer; background: #d1e5f7; border: none; color: #1a3a5c; }
  .tweet-area-wrapper { margin-top: 16px; background: #fff; border-radius: 14px; padding: 16px; border: 1px solid #e0e8f0; }
  .tweet-label { font-size: 10px; color: #99aabb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .tweet-text { font-size: 13px; color: #1a1a1a; line-height: 1.6; font-family: 'SF Mono', 'Fira Code', monospace; white-space: pre-wrap; word-break: break-word; }
  .copy-btn { margin-top: 10px; padding: 6px 14px; font-size: 11px; border-radius: 8px; cursor: pointer; background: #f0f4f8; border: 1px solid #d0dae4; color: #4a6a8a; }
  .history { margin-top: 24px; border-top: 1px solid #d8e4ef; padding-top: 16px; }
  .history-label { font-size: 10px; color: #99aabb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .history-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-chip { padding: 5px 12px; font-size: 12px; border-radius: 20px; cursor: pointer; background: #fff; border: 1px solid #d0dae4; color: #4a6a8a; }
  .history-chip:hover { background: #e8f0f8; border-color: #b49ce8; }
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>babynames.market — name card generator</h1></div>
  <div id="loading-area" class="status">
    <div id="loading-text">loading name data...</div>
    <div class="sub">2.1 million records across 145 years (~17MB)</div>
  </div>
  <div id="search-area" style="display:none;">
    <div class="search-bar">
      <input type="text" id="name-input" placeholder="enter a name..." autocomplete="off" />
      <div class="sex-toggle">
        <button class="sex-btn active" id="btn-f" onclick="setSex('F')">girl</button>
        <button class="sex-btn" id="btn-m" onclick="setSex('M')">boy</button>
      </div>
      <button class="lookup-btn" onclick="doSearch()">look up</button>
    </div>
    <div class="btn-row">
      <button class="random-btn" onclick="randomName()">random obscure name</button>
      <button class="export-btn" id="export-btn" onclick="exportCard()" disabled>export card as PNG</button>
    </div>
    <div id="error-msg" class="error" style="display:none;"></div>
  </div>
  <div id="card-area" style="display:none;"></div>
  <div id="edit-area" style="display:none;"></div>
  <div id="tweet-area" style="display:none;"></div>
  <div id="history-area" style="display:none;">
    <div class="history">
      <div class="history-label">recent lookups</div>
      <div class="history-chips" id="history-chips"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const YEAR_MIN = 1880, YEAR_MAX = 2024;
let nameData = {}, nameKeys = [], nameIndex = {}, yearTotals = {};
let currentSex = 'F', searchHistory = [], currentProfile = null;

function rattleSVG(stripeColor) {
  var c = '#8a9bb5';
  return '<svg viewBox="0 0 36 58" xmlns="http://www.w3.org/2000/svg" width="36" height="58">' +
    '<defs><clipPath id="rc"><circle cx="18" cy="15" r="13"/></clipPath></defs>' +
    '<circle cx="18" cy="15" r="13" fill="' + c + '"/>' +
    '<g clip-path="url(#rc)">' +
      '<path d="M5,9 Q18,13 31,9" fill="none" stroke="' + stripeColor + '" stroke-width="2.5" stroke-linecap="round"/>' +
      '<path d="M5,16 Q18,20 31,16" fill="none" stroke="' + stripeColor + '" stroke-width="3.5" stroke-linecap="round"/>' +
      '<path d="M5,23 Q18,27 31,23" fill="none" stroke="' + stripeColor + '" stroke-width="2" stroke-linecap="round"/>' +
    '</g>' +
    '<ellipse cx="18" cy="28" rx="6.5" ry="2.5" fill="' + c + '"/>' +
    '<path d="M14,28 Q14,33 13,38 Q12.2,42 13,45 Q14,48 16,50 Q17,51.5 18,52.5 Q19,51.5 20,50 Q22,48 23,45 Q23.8,42 23,38 Q22,33 22,28 Z" fill="' + c + '"/>' +
    '<ellipse cx="18" cy="50" rx="5" ry="5.5" fill="' + c + '"/>' +
    '<ellipse cx="18" cy="50" rx="2.8" ry="3" fill="#0c1425"/>' +
  '</svg>';
}

async function loadData() {
  const lt = document.getElementById('loading-text');
  try {
    lt.textContent = 'fetching data...';
    const r = await fetch('ssa-names.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    lt.textContent = 'parsing...';
    nameData = await r.json();
    nameKeys = Object.keys(nameData);
    for (const key of nameKeys) nameIndex[key.toLowerCase()] = key;
    lt.textContent = 'building rank index...';
    for (const [key, arr] of Object.entries(nameData)) {
      const sex = key.split('/')[1];
      for (let i = 0; i < arr.length; i += 2) {
        const year = arr[i], count = arr[i + 1];
        if (!yearTotals[year]) yearTotals[year] = {};
        if (!yearTotals[year][sex]) yearTotals[year][sex] = [];
        yearTotals[year][sex].push({ key, count });
      }
    }
    for (const y of Object.keys(yearTotals))
      for (const s of Object.keys(yearTotals[y]))
        yearTotals[y][s].sort((a, b) => b.count - a.count);
    document.getElementById('loading-area').style.display = 'none';
    document.getElementById('search-area').style.display = 'block';
    document.getElementById('name-input').focus();
  } catch (e) {
    lt.textContent = 'failed: ' + e.message;
    document.querySelector('.sub').textContent = 'make sure ssa-names.json is in the same folder. serve via http, not file://.';
  }
}

function buildProfile(name, sex) {
  const lk = (name + '/' + sex).toLowerCase(), rk = nameIndex[lk];
  if (!rk) return null;
  const arr = nameData[rk], rn = rk.split('/')[0], entries = [];
  for (let i = 0; i < arr.length; i += 2) {
    const year = arr[i], count = arr[i + 1];
    const yl = yearTotals[year] && yearTotals[year][sex];
    let rank = yl ? yl.findIndex(e => e.key === rk) + 1 : 0;
    entries.push({ year, count, rank });
  }
  entries.sort((a, b) => a.year - b.year);
  if (!entries.length) return null;
  const pk = entries.reduce((b, e) => e.count > b.count ? e : b, entries[0]);
  return { name: rn, sex, entries, peakYear: pk.year, peakRank: pk.rank, peakCount: pk.count, firstYear: entries[0].year, lastYear: entries[entries.length - 1].year, totalBabies: entries.reduce((s, e) => s + e.count, 0), yearsOnList: entries.length, yearsSinceLastSeen: YEAR_MAX - entries[entries.length - 1].year, isActive: entries[entries.length - 1].year >= YEAR_MAX - 2 };
}

function setSex(s) { currentSex = s; document.getElementById('btn-f').classList.toggle('active', s === 'F'); document.getElementById('btn-m').classList.toggle('active', s === 'M'); }

function randomName() {
  const obs = nameKeys.filter(k => nameData[k].length <= 10);
  if (!obs.length) return;
  const pick = obs[Math.floor(Math.random() * obs.length)], [n, s] = pick.split('/');
  document.getElementById('name-input').value = n; setSex(s); doSearch();
}

function doSearch() {
  const input = document.getElementById('name-input').value.trim(), err = document.getElementById('error-msg');
  err.style.display = 'none';
  if (!input) return;
  let p = buildProfile(input, currentSex);
  if (!p) { const os = currentSex === 'F' ? 'M' : 'F'; p = buildProfile(input, os); if (p) setSex(os); }
  if (!p) { err.textContent = '\u201c' + input + '\u201d not found.'; err.style.display = 'block'; document.getElementById('card-area').style.display = 'none'; document.getElementById('edit-area').style.display = 'none'; document.getElementById('tweet-area').style.display = 'none'; document.getElementById('export-btn').disabled = true; return; }
  currentProfile = p;
  searchHistory = searchHistory.filter(h => h.key !== p.name + '/' + p.sex);
  searchHistory.unshift({ key: p.name + '/' + p.sex, name: p.name, sex: p.sex });
  if (searchHistory.length > 15) searchHistory.pop();
  renderHistory(); renderCard(p, '', ''); renderEditArea(p); renderTweet(p);
  document.getElementById('export-btn').disabled = false;
}

function renderHistory() {
  const a = document.getElementById('history-area'), c = document.getElementById('history-chips');
  if (!searchHistory.length) { a.style.display = 'none'; return; }
  a.style.display = 'block';
  c.innerHTML = searchHistory.map(h => '<button class="history-chip" onclick="qSearch(\'' + h.name.replace(/'/g, "\\'") + '\',\'' + h.sex + '\')">' + h.name + ' <span style="color:#b49ce8;font-size:10px">' + h.sex + '</span></button>').join('');
}
function qSearch(n, s) { document.getElementById('name-input').value = n; setSex(s); doSearch(); }

function sparkSVG(entries, peakYear, accent, gradId) {
  accent = accent || '#9cb4e8';
  const w = 456, h = 120, padL = 0, padR = 0, padT = 10, padB = 22;
  const chartH = h - padT - padB;
  const mc = Math.max(...entries.map(e => e.count));
  const minYear = entries[0].year, maxYear = entries[entries.length - 1].year;
  const yearSpan = Math.max(maxYear - minYear, 1);
  const xY = y => padL + ((y - minYear) / yearSpan) * (w - padL - padR);
  const yC = c => padT + chartH - (c / mc) * chartH;

  let s = '<svg width="100%" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">';
  s += '<defs><linearGradient id="' + gradId + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + accent + '" stop-opacity="0.3"/><stop offset="100%" stop-color="' + accent + '" stop-opacity="0"/></linearGradient></defs>';

  // baseline
  s += '<line x1="0" y1="' + (padT + chartH) + '" x2="' + w + '" y2="' + (padT + chartH) + '" stroke="#1e2d44" stroke-width="0.5"/>';

  if (entries.length === 1) {
    const cx = w / 2, cy = padT + chartH / 2;
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="12" fill="' + accent + '" opacity="0.08"/>';
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="6" fill="' + accent + '" opacity="0.2"/>';
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="3" fill="' + accent + '"/>';
    s += '<text x="' + cx + '" y="' + (h - 4) + '" fill="#4a6178" font-size="10" text-anchor="middle" font-family="monospace">' + entries[0].year + '</text>';
  } else {
    // gradient fill under the line
    const pts = entries.map(e => xY(e.year) + ',' + yC(e.count));
    const fillPts = pts.join(' ') + ' ' + xY(maxYear) + ',' + (padT + chartH) + ' ' + xY(minYear) + ',' + (padT + chartH);
    s += '<polygon points="' + fillPts + '" fill="url(#' + gradId + ')"/>';
    // the line
    s += '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + accent + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>';
    // dot on peak
    const pe = entries.find(e => e.year === peakYear);
    if (pe) { const cx = xY(pe.year), cy = yC(pe.count); s += '<circle cx="' + cx + '" cy="' + cy + '" r="3" fill="' + accent + '" opacity="0.4"/>'; }
    // dot on last
    const last = entries[entries.length - 1];
    s += '<circle cx="' + xY(last.year) + '" cy="' + yC(last.count) + '" r="4" fill="' + accent + '"/>';
    // dot on first if line has a visible start
    s += '<circle cx="' + xY(entries[0].year) + '" cy="' + yC(entries[0].count) + '" r="3" fill="' + accent + '" opacity="0.5"/>';
    // year labels
    s += '<text x="0" y="' + (h - 4) + '" fill="#4a6178" font-size="10" text-anchor="start" font-family="monospace">' + minYear + '</text>';
    s += '<text x="' + w + '" y="' + (h - 4) + '" fill="#4a6178" font-size="10" text-anchor="end" font-family="monospace">' + maxYear + '</text>';
  }
  return s + '</svg>';
}

function renderCard(p, summaryText) {
  const a = document.getElementById('card-area'); a.style.display = 'block';
  const isGirl = p.sex === 'F';
  const outerBg = isGirl ? '#f7d1e5' : '#d1e5f7';
  const accent = isGirl ? '#e89cb4' : '#9cb4e8';
  const headerColor = isGirl ? '#b56b8d' : '#6b8db5';
  const sexColor = isGirl ? '#c47a95' : '#7a95c4';
  const stripeColor = isGirl ? '#f7d1e5' : '#d1e5f7';
  const gradId = 'grad-' + Date.now();

  const sub = p.isActive ? 'appeared ' + p.firstYear + ' \u00b7 rank #' + p.peakRank + ' \u00b7 continuing'
    : p.yearsOnList === 1 ? 'appeared ' + p.firstYear + ' \u00b7 rank #' + p.peakRank + ' \u00b7 then nothing'
    : p.firstYear + '\u2013' + p.lastYear + ' \u00b7 peak rank #' + p.peakRank + ' in ' + p.peakYear;

  let s3v, s3l, s3c;
  if (p.isActive) { s3v = '0'; s3l = 'years gone'; s3c = '#4ade80'; }
  else if (p.yearsSinceLastSeen > 0) { s3v = p.yearsSinceLastSeen; s3l = 'years gone'; s3c = '#f87171'; }
  else { s3v = '#' + p.peakRank; s3l = 'peak rank'; s3c = '#4ade80'; }

  let narHTML = '';
  if (summaryText) narHTML = '<div class="card-narrative"><div class="narrative-box"><div class="narrative-summary">' + summaryText + '</div></div></div>';

  a.innerHTML = '<div class="card-outer" id="screenshot-target" style="background:' + outerBg + '">' +
    '<div class="card-header" style="color:' + headerColor + '"><span>ssa file #' + String(p.peakRank).padStart(4, '0') + '</span><span>babynames.market</span></div>' +
    '<div class="card-inner">' +
      '<div class="card-top">' +
        '<div class="card-name-left"><div class="card-name-row"><span class="card-name">' + p.name + '</span><span class="card-sex" style="color:' + sexColor + '">' + (isGirl ? 'girl' : 'boy') + '</span></div><div class="card-subtitle">' + sub + '</div></div>' +
        '<div class="card-rattle">' + rattleSVG(stripeColor) + '</div>' +
      '</div>' +
      '<div class="card-chart">' + sparkSVG(p.entries, p.peakYear, accent, gradId) + '</div>' +
      '<div class="card-stats">' +
        '<div class="stat-box"><div class="stat-value" style="color:#4ade80">' + p.yearsOnList + '</div><div class="stat-label">' + (p.yearsOnList === 1 ? 'year on list' : 'years on list') + '</div></div>' +
        '<div class="stat-box"><div class="stat-value" style="color:#f0f4f8">' + p.totalBabies.toLocaleString() + '</div><div class="stat-label">total babies</div></div>' +
        '<div class="stat-box"><div class="stat-value" style="color:' + s3c + '">' + s3v + '</div><div class="stat-label">' + s3l + '</div></div>' +
      '</div>' +
      narHTML +
    '</div>' +
  '</div>';
}

function renderEditArea(p) {
  const a = document.getElementById('edit-area'); a.style.display = 'block';
  let ds = '';
  if (p.yearsOnList === 1) ds = p.totalBabies + ' babies were given this name in ' + p.firstYear + '. then it vanished entirely. the minimum viable name.';
  else if (p.isActive) ds = p.name + ' has consistently risen in popularity since ' + p.firstYear + ', becoming a top ' + Math.ceil(p.peakRank / 10) * 10 + ' name in ' + YEAR_MAX + '.';
  else if (p.yearsOnList <= 5) ds = p.name.toLowerCase() + ' appeared ' + p.yearsOnList + ' times between ' + p.firstYear + ' and ' + p.lastYear + '. ' + p.totalBabies.toLocaleString() + ' babies total. barely a name.';
  else ds = p.name.toLowerCase() + ' peaked at #' + p.peakRank + ' in ' + p.peakYear + ' with ' + p.peakCount.toLocaleString() + ' babies, then faded over ' + p.yearsOnList + ' years.';
  a.innerHTML = '<div class="edit-area"><div class="edit-label">card text (edit and apply)</div><textarea id="summary-input" rows="2">' + ds + '</textarea><button class="apply-btn" onclick="applyNarrative()">apply to card</button></div>';
  renderCard(currentProfile, ds);
}

function applyNarrative() { if (currentProfile) renderCard(currentProfile, document.getElementById('summary-input').value.trim()); }

function renderTweet(p) {
  const a = document.getElementById('tweet-area'); a.style.display = 'block';
  let t;
  if (p.yearsOnList === 1) t = p.name.toLowerCase() + '. ' + p.totalBabies + ' babies. ' + p.firstYear + '. never again.\n\nthe minimum viable name.';
  else if (p.isActive) t = p.name.toLowerCase() + '. on the list since ' + p.firstYear + '. peaked at #' + p.peakRank + ' in ' + p.peakYear + '. ' + p.totalBabies.toLocaleString() + ' babies and counting.';
  else if (p.yearsOnList <= 5) t = p.name.toLowerCase() + '. ' + p.yearsOnList + ' years. ' + p.totalBabies.toLocaleString() + ' babies. barely a name.\n\nmore of a rumor.';
  else t = p.name.toLowerCase() + '. ' + p.firstYear + '\u2013' + p.lastYear + '. peaked at #' + p.peakRank + '. then ' + p.yearsSinceLastSeen + ' years of silence.\n\nnames don\'t die. they just stop being chosen.';
  a.innerHTML = '<div class="tweet-area-wrapper"><div class="tweet-label">suggested tweet</div><div class="tweet-text" id="tweet-text">' + t + '</div><button class="copy-btn" onclick="copyTweet()">copy tweet</button></div>';
}

function copyTweet() { navigator.clipboard.writeText(document.getElementById('tweet-text').textContent).then(() => { const b = document.querySelector('.copy-btn'); b.textContent = 'copied'; setTimeout(() => b.textContent = 'copy tweet', 1500); }); }

function exportCard() {
  const target = document.getElementById('screenshot-target');
  if (!target) return;
  const btn = document.getElementById('export-btn');
  btn.textContent = 'exporting...'; btn.disabled = true;
  const size = 500;
  html2canvas(target, { backgroundColor: null, scale: 2, width: size, height: size, useCORS: true, logging: false }).then(function(canvas) {
    const sq = document.createElement('canvas'), side = Math.max(canvas.width, canvas.height);
    sq.width = side; sq.height = side;
    const ctx = sq.getContext('2d');
    ctx.fillStyle = currentProfile && currentProfile.sex === 'F' ? '#f7d1e5' : '#d1e5f7';
    ctx.fillRect(0, 0, side, side);
    ctx.drawImage(canvas, Math.round((side - canvas.width) / 2), Math.round((side - canvas.height) / 2));
    const link = document.createElement('a');
    link.download = (currentProfile ? currentProfile.name.toLowerCase() : 'namecard') + '-babynames-market.png';
    link.href = sq.toDataURL('image/png'); link.click();
    btn.textContent = 'export card as PNG'; btn.disabled = false;
  }).catch(function() { btn.textContent = 'export failed'; btn.disabled = false; setTimeout(() => { btn.textContent = 'export card as PNG'; }, 2000); });
}

document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
loadData();
</script>
</body>
</html>
